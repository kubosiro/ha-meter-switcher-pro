<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Đảo Điện An Toàn 3 Bước - v1.1</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { width: 100%; max-width: 360px; background: #1c1c1c; border-radius: 20px; padding: 20px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid #333; box-sizing: border-box; }
        .meter { padding: 15px; border-radius: 15px; background: #252525; margin-bottom: 12px; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .meter.active { border-color: #2196f3; background: rgba(33, 150, 243, 0.08); }
        .safety-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); border-radius: 20px; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 25px; z-index: 100; border: 2px solid #ff9800; box-sizing: border-box; }
        .safety-msg { font-weight: 900; margin-bottom: 15px; line-height: 1.5; color: #ff9800; font-size: 14px; }
        .safety-timer { font-size: 40px; font-weight: 900; margin-bottom: 20px; color: #fff; }
        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 14px; border-radius: 30px; border: none; font-weight: 900; cursor: pointer; font-size: 12px; width: 100%; }
        .btn-confirm { background: #f44336; color: white; }
        .btn-cancel { background: #424242; color: white; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="card">
    <h3 style="text-align:center; color: #2196f3;">METER SWITCHER PRO</h3>
    <div id="safety" class="safety-overlay">
        <div id="msg" class="safety-msg">ĐANG CHUẨN BỊ...</div>
        <div id="timer" class="safety-timer">5s</div>
        <div id="controls" class="btn-group">
            <button class="btn btn-cancel" onclick="reset()">HỦY LỆNH</button>
        </div>
    </div>
    <div id="m1" class="meter" onclick="startFlow('ÔNG MY')">
        <div style="font-weight:900;">ÔNG MY</div>
        <div style="font-size:12px; opacity:0.6; margin-top:5px;">23.7 kWh | 50.782đ</div>
    </div>
    <div id="m2" class="meter active">
        <div style="font-weight:900; color:#2196f3;">HÙNG (Đang chạy)</div>
        <div style="font-size:12px; opacity:0.6; margin-top:5px;">28.28 kWh | 60.596đ</div>
    </div>
</div>

<script>
    let state = 0; let timer = 5; let interval;

    function startFlow(name) {
        state = 1; timer = 5;
        document.getElementById('safety').style.display = 'flex';
        document.getElementById('msg').innerHTML = "CHUẨN BỊ CHUYỂN SANG<br><span style='color:white;'>" + name + "</span>";
        startTimer(step2);
    }

    function step2() {
        state = 2; timer = 10; // Đợi 10s để xác nhận, ko nhấn là hủy
        document.getElementById('safety').style.borderColor = '#f44336';
        document.getElementById('msg').className = "safety-msg blink";
        document.getElementById('msg').innerHTML = "⚠️ CẢNH BÁO NGUY HIỂM<br><span style='color:white;'>Cẩn trọng nếu đang có tải lớn!</span>";
        document.getElementById('controls').innerHTML = `
            <button class="btn btn-confirm" onclick="step3()">XÁC NHẬN ĐẢO ĐIỆN (<span id='btn-timer'>10</span>s)</button>
            <button class="btn btn-cancel" onclick="reset()">HỦY</button>
        `;
        startTimer(reset); // Hết 10s ko nhấn là reset
    }

    function step3() {
        state = 3; timer = 5;
        document.getElementById('safety').style.borderColor = '#ff9800';
        document.getElementById('msg').className = "safety-msg";
        document.getElementById('msg').innerHTML = "⚡ ĐANG THỰC THI ĐẢO ĐIỆN";
        document.getElementById('controls').innerHTML = `<button class="btn btn-cancel" onclick="reset()">DỪNG NGAY</button>`;
        startTimer(finish);
    }

    function finish() { alert("THÀNH CÔNG!"); reset(); }

    function startTimer(callback) {
        clearInterval(interval); updateDisplay();
        interval = setInterval(() => {
            timer--; updateDisplay();
            if (timer <= 0) { clearInterval(interval); callback(); }
        }, 1000);
    }

    function updateDisplay() {
        if (state === 2) {
            const btnT = document.getElementById('btn-timer');
            if (btnT) btnT.innerText = timer;
            document.getElementById('timer').innerText = "";
        } else {
            document.getElementById('timer').innerText = timer + "s";
        }
    }

    function reset() {
        clearInterval(interval); state = 0;
        document.getElementById('safety').style.display = 'none';
        document.getElementById('safety').style.borderColor = '#ff9800';
        document.getElementById('msg').className = "safety-msg";
        document.getElementById('timer').innerText = "";
        document.getElementById('controls').innerHTML = `<button class="btn btn-cancel" onclick="reset()">HỦY LỆNH</button>`;
    }
</script>
</body>
</html>
